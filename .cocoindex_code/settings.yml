include_patterns:
  - "**/*.py"
  - "**/*.js"
  - "**/*.ts"
  - "**/*.rs"
  - "**/*.go"
  - "**/*.md"
  - "**/*.mdx"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.toml"
  - "**/*.json"
  - "**/*.sql"
  - "**/*.sh"
  - "**/*.css"
  - "**/*.html"
  - "**/*.java"
  - "**/*.c"
  - "**/*.cpp"
  - "**/*.h"
  - "**/*.hpp"
  - "**/*.cs"
  - "**/*.rb"
  - "**/*.swift"
  - "**/*.kt"

exclude_patterns:
  - "**/.*"
  - "**/__pycache__"
  - "**/node_modules"
  - "**/dist"
  - "**/build"
  - "**/.git"
  - "**/.agent"
  - "**/.venv"
  - "**/__pycache__"
