name: "Python Security & Quality Stack (uv)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup uv and Sync Environment
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync Dependencies
        run: uv sync --frozen # Uses uv.lock exactly, no generation needed

      # 2. CodeQL Analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 3. Meta Pyre (Native uv execution)
      - name: Run Pyre Type Check
        run: uv run pyre --output=sarif check > pyre-results.sarif
        continue-on-error: true # Allow upload even if types fail

      - name: Upload Pyre SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pyre-results.sarif
          category: pyre-type-check   
